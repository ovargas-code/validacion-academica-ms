<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>UdeM - Validación Académica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-header bg-primary text-white text-center">
            <h3>Verificación de Títulos</h3>
        </div>
        <div class="card-body">
            <form action="/verificar" method="POST">
                <div class="mb-3">
                    <label class="form-label">Documento del Estudiante</label>
                    <input type="text" name="document" class="form-control" placeholder="Ej: 71671967" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Su Correo (Para registro)</label>
                    <input type="email" name="email" class="form-control" placeholder="empresa@correo.com" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Validar Ahora</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
