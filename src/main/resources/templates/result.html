<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultado - UdeM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 text-center">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-body">
            <h2 class="mb-4">Resultado de la Validación</h2>

            <div th:class="${status.name() == 'VALID' ? 'alert alert-success' : 'alert alert-warning'}" role="alert">
                <h4 th:text="${status}">ESTADO</h4>
                <p th:text="${message}">Mensaje del sistema</p>
            </div>

            <div th:if="${status.name() == 'VALID'}" class="mt-4">
                <p>Use el siguiente código para descargar su certificado:</p>
                <h3 class="text-primary" th:text="${code}">UDEM-XXXX</h3>
                <a th:href="@{'/api/v1/verificaciones/' + ${code} + '/pdf'}"
                   class="btn btn-primary btn-lg mt-3">Descargar Certificado PDF</a>
            </div>

            <hr>
            <a href="/" class="btn btn-outline-secondary">Realizar otra consulta</a>
        </div>
    </div>
</div>
</body>
</html>
